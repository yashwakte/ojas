name: Build Frontend

on:
  push:
    branches: [main]
    paths:
      - "ojas-frontend/**"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: ojas-frontend/package-lock.json

      - name: Install dependencies
        working-directory: ./ojas-frontend
        run: npm ci

      - name: Build
        working-directory: ./ojas-frontend
        run: npx ng build --configuration production

      # Deployment is handled automatically by Vercel on push to main
